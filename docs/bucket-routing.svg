<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 470" font-family="Segoe UI, Helvetica, Arial, sans-serif">
  <defs>
    <marker id="a" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#475569"/>
    </marker>
  </defs>
  <rect x="0" y="0" width="1000" height="470" fill="#ffffff"/>
  <text x="500" y="34" text-anchor="middle" font-size="20" font-weight="700" fill="#0f172a">Context-Bucket Routing — append vs. create</text>

  <!-- upload -->
  <rect x="40" y="70" width="180" height="58" rx="10" fill="#eef2ff" stroke="#6366f1" stroke-width="1.5"/>
  <text x="130" y="98" text-anchor="middle" font-size="14" font-weight="600" fill="#4338ca">Upload document</text>
  <text x="130" y="116" text-anchor="middle" font-size="11.5" fill="#6366f1">PDF / text</text>

  <!-- signature -->
  <rect x="270" y="70" width="200" height="58" rx="10" fill="#fffbeb" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="370" y="94" text-anchor="middle" font-size="13.5" font-weight="600" fill="#92400e">Summarize + Embed</text>
  <text x="370" y="113" text-anchor="middle" font-size="11.5" fill="#b45309">→ context signature</text>

  <!-- compare -->
  <rect x="520" y="70" width="220" height="58" rx="10" fill="#fffbeb" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="630" y="94" text-anchor="middle" font-size="13.5" font-weight="600" fill="#92400e">Context-Router</text>
  <text x="630" y="113" text-anchor="middle" font-size="11.5" fill="#b45309">cosine vs. bucket signatures</text>

  <line x1="220" y1="99" x2="268" y2="99" stroke="#475569" stroke-width="2" marker-end="url(#a)"/>
  <line x1="470" y1="99" x2="518" y2="99" stroke="#475569" stroke-width="2" marker-end="url(#a)"/>

  <!-- decision diamond -->
  <polygon points="630,170 740,225 630,280 520,225" fill="#f5f3ff" stroke="#8b5cf6" stroke-width="1.5"/>
  <text x="630" y="218" text-anchor="middle" font-size="13" font-weight="600" fill="#6d28d9">similarity</text>
  <text x="630" y="236" text-anchor="middle" font-size="13" font-weight="600" fill="#6d28d9">&#8805; threshold?</text>
  <line x1="630" y1="128" x2="630" y2="168" stroke="#475569" stroke-width="2" marker-end="url(#a)"/>

  <!-- yes branch -->
  <line x1="740" y1="225" x2="820" y2="225" stroke="#475569" stroke-width="2" marker-end="url(#a)"/>
  <text x="772" y="215" text-anchor="middle" font-size="12" font-weight="700" fill="#059669">yes</text>
  <rect x="820" y="196" width="150" height="58" rx="10" fill="#ecfdf5" stroke="#059669" stroke-width="1.5"/>
  <text x="895" y="220" text-anchor="middle" font-size="13.5" font-weight="600" fill="#047857">Append to</text>
  <text x="895" y="238" text-anchor="middle" font-size="13.5" font-weight="600" fill="#047857">existing bucket</text>

  <!-- no branch -->
  <line x1="630" y1="280" x2="630" y2="330" stroke="#475569" stroke-width="2" marker-end="url(#a)"/>
  <text x="648" y="308" font-size="12" font-weight="700" fill="#be185d">no</text>
  <rect x="540" y="330" width="180" height="58" rx="10" fill="#fdf2f8" stroke="#ec4899" stroke-width="1.5"/>
  <text x="630" y="354" text-anchor="middle" font-size="13.5" font-weight="600" fill="#be185d">Create new bucket</text>
  <text x="630" y="372" text-anchor="middle" font-size="11.5" fill="#db2777">(LLM names it)</text>

  <!-- borderline note -->
  <rect x="430" y="150" width="6" height="6" fill="none"/>
  <text x="40" y="200" font-size="12.5" fill="#475569" font-weight="700">Borderline band</text>
  <text x="40" y="222" font-size="12" fill="#64748b">If similarity is just below the</text>
  <text x="40" y="240" font-size="12" fill="#64748b">threshold, an LLM tie-breaker</text>
  <text x="40" y="258" font-size="12" fill="#64748b">compares summaries to confirm</text>
  <text x="40" y="276" font-size="12" fill="#64748b">whether it is the same subject.</text>

  <!-- converge -->
  <line x1="820" y1="240" x2="800" y2="240" stroke="#475569" stroke-width="0"/>
  <rect x="340" y="410" width="580" height="44" rx="10" fill="#eff6ff" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="630" y="437" text-anchor="middle" font-size="13" font-weight="600" fill="#1d4ed8">Ontology inferred → CrewAI extracts → persisted to Neo4j (per bucket)</text>
  <line x1="895" y1="254" x2="895" y2="432" stroke="#475569" stroke-width="2" marker-end="url(#a)"/>
  <line x1="630" y1="388" x2="630" y2="408" stroke="#475569" stroke-width="2" marker-end="url(#a)"/>
</svg>
